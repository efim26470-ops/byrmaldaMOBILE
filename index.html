<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1">
  <meta name="theme-color" content="#080d18">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="CS2 Mobile Lab">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="format-detection" content="telephone=no">
  <title>CS2 Mobile Lab</title>
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="icon" href="favicon.svg" type="image/svg+xml">
  <link rel="apple-touch-icon" href="assets/icons/apple-touch-icon.png">
  <link rel="stylesheet" href="styles.css?v=mobile-clean-7">
  <script>
    (function(){
      function setVH(){ document.documentElement.style.setProperty('--vh', (window.innerHeight * 0.01) + 'px'); }
      setVH();
      window.addEventListener('resize', setVH, {passive:true});
      window.addEventListener('orientationchange', function(){ setTimeout(setVH, 250); }, {passive:true});
      document.documentElement.classList.add('mobile-clean');
    })();
  </script>
</head>
<body>
  <header class="app-head">
    <div class="brand">
      <span class="logo">✦</span>
      <div><b>CS2 Mobile Lab</b><small>case simulator</small></div>
    </div>
    <div class="wallet">
      <a href="#ads" class="pill js-balance">0 ₽LC</a>
      <a href="#inventory" class="pill bag">🎒 <span class="js-inv-count">0</span></a>
    </div>
  </header>

  <main id="app" class="app-shell" aria-live="polite">
    <div class="loading">Загрузка...</div>
  </main>

  <nav class="bottom-nav" aria-label="Навигация">
    <a href="#home" data-tab="home">Главная</a>
    <a href="#cases" data-tab="cases">Кейсы</a>
    <a href="#inventory" data-tab="inventory">Инвентарь</a>
    <a href="#upgrade" data-tab="upgrade">Апгрейд</a>
    <a href="#more" data-tab="more">Ещё</a>
  </nav>

  <div id="modal" class="modal" hidden>
    <div class="modal-backdrop" data-close-modal></div>
    <section class="modal-panel" role="dialog" aria-modal="true">
      <div class="modal-head">
        <h3 id="modalTitle">Окно</h3>
        <button type="button" class="icon-btn" data-close-modal aria-label="Закрыть">×</button>
      </div>
      <div id="modalBody" class="modal-body"></div>
    </section>
  </div>

  <div id="toast" class="toast" hidden></div>

  <script src="app.js?v=mobile-clean-7" defer></script>
</body>
</html>
